; save_modules.cfg — Enhanced Save System 模块注册配置文件 (CloseAI)
;
; 用途：
;   当 SaveSystem.use_module_config = true 时，系统将从此文件读取模块列表，
;   替代基于文件系统顺序的自动扫描（auto_register）。
;
; 字段说明：
;   path     (String,  必填) — 模块脚本的资源路径，必须是 ISaveModule 的子类
;   enabled  (bool,    可选) — 是否启用此模块，默认 true
;   priority (int,     可选) — 加载优先级，数值越小越先执行，默认 100

; ──────────────────────────────────────────────
; 全局模块（写入 global.json）
; ──────────────────────────────────────────────

[settings_module]
path = "res://addons/enhance_save_system/Modules/settings_module.gd"
enabled = true
priority = 5

[keybinding_module]
path = "res://addons/enhance_save_system/Modules/keybinding_module.gd"
enabled = true
priority = 10

; stats_module —— CloseAI 干净/脏关闭检测的核心（clean_exit / had_unclean_exit）
[stats_module]
path = "res://addons/enhance_save_system/Modules/stats_module.gd"
enabled = true
priority = 15

; app_state_module —— 存当前 CloseAI 关卡编号、打开次数
[app_state_module]
path = "res://addons/enhance_save_system/Modules/app_state_module.gd"
enabled = true
priority = 19

; ──────────────────────────────────────────────
; 槽位模块（写入 slot_XX.json）
; ──────────────────────────────────────────────

[player_module]
path = "res://addons/enhance_save_system/Modules/player_module.gd"
enabled = true
priority = 20

[level_module]
path = "res://addons/enhance_save_system/Modules/level_module.gd"
enabled = true
priority = 25
